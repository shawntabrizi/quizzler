name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check tooling and E2E helpers
        run: pnpm typecheck:tools

      - name: Run unit tests
        run: pnpm test

      - name: Build the app
        run: pnpm build

      - name: Validate starter packs
        run: pnpm validate:packs

      - name: Lint starter-pack editorial records
        run: pnpm validate:editorial

      - name: Strictly audit release-ready starter packs
        run: pnpm audit:editorial

  rust-logic:
    name: Rust logic tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/logic/target
          key: ${{ runner.os }}-cargo-logic-${{ hashFiles('contracts/logic/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-logic-

      - name: Run pure logic tests
        run: cargo test --locked --manifest-path contracts/logic/Cargo.toml

  # The four deployed PolkaVM crates were previously never compiled in CI,
  # so a contract-breaking change could land green.
  contracts:
    name: Contract builds
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up nightly Rust (build-std needs rust-src)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-pvm-contract
            contracts/quizzler/target
            contracts/registry/target
            contracts/session-registry/target
            contracts/pack-signals/target
          key: ${{ runner.os }}-cargo-contracts-${{ hashFiles('contracts/*/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-contracts-

      - name: Install cargo-pvm-contract
        # Same branch the contracts' pvm_contract dependency is pinned to.
        run: |
          command -v cargo-pvm-contract >/dev/null 2>&1 || \
            cargo install --git https://github.com/paritytech/cargo-pvm-contract \
              --branch charles/cdm-integration cargo-pvm-contract --locked

      - name: Build game contract
        run: cargo pvm-contract build
        working-directory: contracts/quizzler

      - name: Build registry contract
        run: cargo pvm-contract build
        working-directory: contracts/registry

      - name: Build session-registry contract
        run: cargo pvm-contract build
        working-directory: contracts/session-registry

      - name: Build pack-signals contract
        run: cargo pvm-contract build
        working-directory: contracts/pack-signals
